x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0-python3.12
  env_file:
    - ../.env
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:

  # ── POSTGRES ────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: airflow_postgres
    restart: always
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  # ── RABBITMQ ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: airflow_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      retries: 5
      start_period: 20s

  # ── INIT ────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ── DAG PROCESSOR ───────────────────────────────────────
  dag-processor:
    <<: *airflow-common
    container_name: airflow_dag
    command: airflow dag-processor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── SCHEDULER ───────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  # ── API / WEBSERVER ─────────────────────────────────────
  airflow-api-server:
    <<: *airflow-common
    container_name: airflow_api
    extra_hosts:
      - "airflow-worker-1:10.0.2.119"
      - "airflow-worker-1:10.0.2.143"
      - "airflow-worker-1:10.0.2.165"
    command: api-server
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      retries: 5
      start_period: 30s
  # ── FLOWER ──────────────────────────────────────────────
  flower:
    <<: *airflow-common
    container_name: airflow_flower
    command: airflow celery flower
    restart: always
    ports:
      - "5555:5555"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
